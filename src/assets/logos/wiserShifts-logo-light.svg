<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Clock icon -->
  <circle cx="40" cy="40" r="36" fill="white" stroke="#0F172A" stroke-width="3.2"/>

  <!-- Major ticks -->
  <line x1="40" y1="6"  x2="40" y2="12" stroke="#0F172A" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="40" y1="68" x2="40" y2="74" stroke="#0F172A" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="6"  y1="40" x2="12" y2="40" stroke="#0F172A" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="68" y1="40" x2="74" y2="40" stroke="#0F172A" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Minor ticks -->
  <line x1="59.0" y1="9.8"  x2="56.4" y2="14.2" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="70.2" y1="21.0" x2="65.4" y2="23.8" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="70.2" y1="59.0" x2="65.4" y2="56.4" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="59.0" y1="70.2" x2="56.4" y2="65.4" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="21.0" y1="70.2" x2="23.8" y2="65.4" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="9.8"  y1="59.0" x2="14.2" y2="56.4" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="9.8"  y1="21.0" x2="14.2" y2="23.8" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
  <line x1="21.0" y1="9.8"  x2="23.8" y2="14.2" stroke="#0F172A" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>

  <!-- WS centered in circle -->
  <text x="40" y="40" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="32" font-weight="900" letter-spacing="-1.6">
    <tspan fill="#0F172A">W</tspan><tspan fill="#2563EB">S</tspan>
  </text>

  <!-- Wordmark -->
  <text x="90" y="40" dominant-baseline="central"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="32" font-weight="900" letter-spacing="-1">
    <tspan fill="#0F172A">Wiser</tspan><tspan fill="#2563EB">Shifts</tspan>
  </text>

</svg>
